<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Location Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: #333333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #1a1a1a;
            text-shadow: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .logo {
            height: 60px;
            width: auto;
            filter: none;
        }

        .subtitle {
            font-size: 1.1em;
            color: #666666;
            margin-bottom: 30px;
        }

        #canvas-container {
            position: relative;
            width: 600px;
            height: 600px;
            margin: 0 auto 30px;
            max-width: 90vw;
            max-height: 60vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .info-panel {
            background: #f8f9fa;
            border: 2px solid #00a8e8;
            border-radius: 15px;
            padding: 25px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0, 168, 232, 0.15);
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            padding: 10px;
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .info-label {
            color: #00a8e8;
            font-weight: 600;
            font-size: 0.95em;
        }

        .info-value {
            color: #1a1a1a;
            font-size: 1.05em;
            text-align: right;
        }

        .loading {
            color: #00a8e8;
            font-size: 1.2em;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .marker {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #ff6b6b;
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.8);
            animation: markerPulse 2s ease-in-out infinite;
            z-index: 100;
        }

        @keyframes markerPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
        }

        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ef5350;
        }
    </style>
</head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Three.js setup
        const container = document.getElementById('canvas-container');
        const canvas = document.getElementById('earthCanvas');
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ 
            canvas: canvas, 
            antialias: true, 
            alpha: true 
        });
        
        renderer.setSize(600, 600);
        renderer.setPixelRatio(window.devicePixelRatio);
        camera.position.z = 3;

        // Create Earth with white and blue marble effect
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        
        // White and blue marble material
        const earthMaterial = new THREE.MeshPhongMaterial({
            color: 0xffffff,
            emissive: 0x1a5490,
            emissiveIntensity: 0.3,
            specular: 0x4488ff,
            shininess: 60,
        });

        const earth = new THREE.Mesh(geometry, earthMaterial);
        scene.add(earth);

        // Add blue accents layer
        const accentGeometry = new THREE.SphereGeometry(1.002, 64, 64);
        const positions = accentGeometry.attributes.position;
        const colors = [];
        
        // Create random blue and white patches for marble effect
        for (let i = 0; i < positions.count; i++) {
            const x = positions.getX(i);
            const y = positions.getY(i);
            const z = positions.getZ(i);
            
            // Convert to lat/lon
            const lat = Math.asin(y) * 180 / Math.PI;
            const lon = Math.atan2(z, x) * 180 / Math.PI;
            
            // Create swirling blue patterns
            const pattern = Math.sin(lat * 0.1) * Math.cos(lon * 0.15) + 
                          Math.sin(lat * 0.2 + lon * 0.1) * 0.5;
            
            if (pattern > 0.2) {
                colors.push(0.1, 0.6, 0.95); // Blue
            } else {
                colors.push(1, 1, 1); // White
            }
        }
        
        accentGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        
        const accentMaterial = new THREE.MeshPhongMaterial({
            vertexColors: true,
            transparent: true,
            opacity: 0.6,
            emissive: 0x0a3a5a,
            emissiveIntensity: 0.2,
            shininess: 40,
        });
        
        const accents = new THREE.Mesh(accentGeometry, accentMaterial);
        earth.add(accents);

        // Add some clouds
        const cloudGeometry = new THREE.SphereGeometry(1.015, 32, 32);
        const cloudMaterial = new THREE.MeshPhongMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.15,
            emissive: 0x333333,
        });
        const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
        scene.add(clouds);
        
        // Add atmosphere glow with blue tint
        const atmosphereGeometry = new THREE.SphereGeometry(1.12, 32, 32);
        const atmosphereMaterial = new THREE.MeshBasicMaterial({
            color: 0x4488ff,
            transparent: true,
            opacity: 0.15,
            side: THREE.BackSide,
        });
        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphere);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.5);
        pointLight.position.set(5, 3, 5);
        scene.add(pointLight);

        const backLight = new THREE.PointLight(0x6699ff, 0.5);
        backLight.position.set(-5, -3, -5);
        scene.add(backLight);

        // Add marker for user location
        let marker = null;
        let userLat = 0;
        let userLon = 0;

        function addLocationMarker(lat, lon) {
            userLat = lat;
            userLon = lon;
        }

        // Animation
        function animate() {
            requestAnimationFrame(animate);
            
            // Slow but visible rotation (increased speed)
            earth.rotation.y += 0.003;
            clouds.rotation.y += 0.0035;
            atmosphere.rotation.y += 0.002;
            
            renderer.render(scene, camera);
        }
        animate();

        // Fetch IP and location data
        async function getLocationData() {
            try {
                // Try multiple APIs in sequence
                let data = null;
                
                // First try: ip-api.com (free, no API key needed)
                try {
                    const response1 = await fetch('http://ip-api.com/json/');
                    if (response1.ok) {
                        const json = await response1.json();
                        data = {
                            ip: json.query,
                            city: json.city,
                            region: json.regionName,
                            country_name: json.country,
                            country_code: json.countryCode,
                            latitude: json.lat,
                            longitude: json.lon,
                            timezone: json.timezone
                        };
                    }
                } catch (e) {
                    console.log('First API failed, trying alternative...');
                }
                
                // Second try: ipify + ipapi
                if (!data) {
                    try {
                        const ipResponse = await fetch('https://api.ipify.org?format=json');
                        const ipData = await ipResponse.json();
                        data = {
                            ip: ipData.ip,
                            city: 'Demo Mode',
                            region: 'Example Region',
                            country_name: 'Demo Country',
                            country_code: 'XX',
                            latitude: 40.7128,
                            longitude: -74.0060,
                            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                        };
                    } catch (e) {
                        console.log('Second API failed, using demo data...');
                    }
                }
                
                // Fallback: Use demo data
                if (!data) {
                    data = {
                        ip: 'Demo Mode',
                        city: 'New York',
                        region: 'New York',
                        country_name: 'United States',
                        country_code: 'US',
                        latitude: 40.7128,
                        longitude: -74.0060,
                        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                    };
                }
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('info-content').style.display = 'block';
                
                // Get country flag emoji
                const getFlagEmoji = (countryCode) => {
                    if (!countryCode || countryCode === 'XX') return '';
                    const codePoints = countryCode
                        .toUpperCase()
                        .split('')
                        .map(char => 127397 + char.charCodeAt());
                    return String.fromCodePoint(...codePoints);
                };
                
                document.getElementById('ip-address').textContent = data.ip || 'Unknown';
                document.getElementById('location').textContent = `${data.city || 'Unknown'}, ${data.region || ''}`;
                document.getElementById('country').textContent = `${data.country_name || 'Unknown'} ${getFlagEmoji(data.country_code)}`;
                document.getElementById('coordinates').textContent = `${data.latitude?.toFixed(4) || '0'}°, ${data.longitude?.toFixed(4) || '0'}°`;
                document.getElementById('timezone').textContent = data.timezone || 'Unknown';
                
                if (data.latitude && data.longitude) {
                    addLocationMarker(data.latitude, data.longitude);
                    
                    // Rotate Earth to show user's location
                    const targetRotation = -(data.longitude * Math.PI / 180);
                    earth.rotation.y = targetRotation;
                }
            } catch (error) {
                document.getElementById('loading').innerHTML = 
                    '<div class="error">Running in demo mode with example location.</div>';
                console.error('Error fetching location:', error);
                
                // Still show demo data
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('info-content').style.display = 'block';
                    document.getElementById('ip-address').textContent = 'Demo Mode';
                    document.getElementById('location').textContent = 'New York, New York';
                    document.getElementById('country').textContent = 'United States 🇺🇸';
                    document.getElementById('coordinates').textContent = '40.7128°, -74.0060°';
                    document.getElementById('timezone').textContent = Intl.DateTimeFormat().resolvedOptions().timeZone;
                    addLocationMarker(40.7128, -74.0060);
                    earth.rotation.y = -(-74.0060 * Math.PI / 180);
                }, 1000);
            }
        }

        // Handle window resize
        function onWindowResize() {
            const size = Math.min(600, window.innerWidth * 0.9, window.innerHeight * 0.6);
            renderer.setSize(size, size);
            camera.aspect = 1;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', onWindowResize);
        onWindowResize();

        // Fetch location on load
        getLocationData();
    </script>
</body>
</html>
